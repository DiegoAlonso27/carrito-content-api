name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # mongodb-memory-server descarga mongod en la primera corrida; se cachea.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format
      - run: npm test
      - run: npm run build
